name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: sk-placeholder
      EXPORT_PAYWALL: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        run: pnpm --filter @ceo-agent/web build

  smoke-local:
    name: Smoke /api/health (dev server)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @ceo-agent/web build

      - name: Start web and smoke /api/health
        run: |
          pnpm --filter @ceo-agent/web exec next start -p 3000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/health | tee /tmp/health.json
          pnpm smoke:prod -- --url http://localhost:3000

  e2e-production:
    name: E2E pipeline (optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Infrastructure check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm check:infra

      - name: List E2E campaign candidates
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: pnpm e2e:video-studio -- --list

      - name: Run E2E pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          E2E_CAMPAIGN_ID: ${{ secrets.E2E_CAMPAIGN_ID }}
          E2E_PROD_QUEUE: "1"
        run: |
          if [ -z "$E2E_CAMPAIGN_ID" ]; then
            echo "E2E_CAMPAIGN_ID secret not set — skipping full pipeline run"
            exit 0
          fi
          pnpm e2e:video-studio -- --run "$E2E_CAMPAIGN_ID"

      - name: Production smoke
        env:
          PRODUCTION_APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
        run: |
          if [ -z "$PRODUCTION_APP_URL" ]; then
            echo "PRODUCTION_APP_URL secret not set — skipping production smoke"
            exit 0
          fi
          pnpm smoke:prod -- --url "$PRODUCTION_APP_URL" --strict --infra
